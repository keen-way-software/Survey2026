graph:
  startId: Start
  nodes:
    - id: Start
      type: START
      title: Start
      question: Start
      nextId: Q1

    - id: Q1
      type: AI
      title: 3 Seasons of Fall Armyworm
      question: >-
        Thinking about the last three seasons, how has fall armyworm affected your harvest?
      nextId: Review

    - id: Review
      type: REVIEW
      title: Review
      question: ''
      nextId: Done

    - id: Done
      type: DONE
      title: Done
      question: ''

slm:
  # Runtime
  accelerator: "GPU"
  max_tokens: 4096
  top_k: 64
  top_p: 0.95
  temperature: 1.0

  # Turn formatting (LiteRT-LM chat style)
  user_turn_prefix: "<start_of_turn>user"
  model_turn_prefix: "<start_of_turn>model"
  turn_end: ""

  # System prompt pieces
  empty_json_instruction: "Jibu kwa kitu cha JSON kilicho tupu: {}"
  preamble: "Wewe ni mtaalamu mashuhuri wa tafiti za wakulima. Soma Swali na Jibu."

  key_contract: 
    role: >
      You are an agricultural survey assistant helping to evaluate farmer responses about crop damage from fall armyworm.
    task: >
      Assess whether a farmer's answer to the survey question is COMPLETE or INCOMPLETE, and if incomplete, generate a single probing follow-up question to gather the missing information.

  length_budget: null

  scoring_rule: null

  strict_output:
    description: Respond in this exact JSON format
    schema:
      rating:
        type: string
        enum: [COMPLETE, INCOMPLETE]
      reason:
        type: string
        description: One sentence explaining why
      probing_question:
        type: string
        nullable: true
        description: A follow-up question if INCOMPLETE, or null if COMPLETE

prompts:
  - nodeId: Q1
    prompt: |-
      completeness_criteria:
        complete:
          description: A complete answer includes most of the following
          criteria:
            - An indication of severity or scale of loss (e.g. percentage, amount, or descriptive magnitude)
            - Coverage across multiple seasons (not just one)
            - Personal impact on their own farm (not just neighbors or the community)
            - At least one consequence — economic, behavioral, or food security related

        incomplete:
          description: An incomplete answer may exhibit one or more of the following
          criteria:
            - Too vague or general (e.g. "it was bad" with no detail)
            - Only covers one season out of three
            - Describes the pest or response actions without stating actual harvest impact
            - Speaks only about other farmers rather than themselves
            - Mentions impact without any scale, severity, or consequence

      Swali: {{QUESTION}}
      Jibu: {{ANSWER}}

model_defaults:
  default_model_url: "https://huggingface.co/google/gemma-3n-E4B-it-litert-lm/resolve/main/gemma-3n-E4B-it-int4.litertlm"
  default_file_name: "Gemma3n4B.litertlm"
  timeout_ms: 1800000
  ui_throttle_ms: 250
  ui_min_delta_bytes: 1048576

whisper:
  enabled: true
  asset_model_path: "models/ggml-small-q5_1.bin"
  language: "sw"
  translate: false
  print_timestamp: false
  target_sample_rate: 16000
  record_sample_rates: [16000, 48000, 44100]
  compute_checksum: true
